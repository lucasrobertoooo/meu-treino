function addCustomFood(){
  const nm=(document.getElementById('cf_name').value||'').trim();
  if(!nm){ alert('Coloca o nome do alimento.'); return; }
  const q=(document.getElementById('cf_q').value||'').trim();
  const p=num(document.getElementById('cf_p').value);
  const c=num(document.getElementById('cf_c').value);
  const k=num(document.getElementById('cf_k').value);
  if(p<=0 && c<=0 && k<=0){
    if(!confirm('Tudo zerado. Adicionar mesmo assim?')) return;
  }

  if(!ST.protein[t] || !Array.isArray(ST.protein[t])) ST.protein[t]=[];
  ST.protein[t].push({n:nm, q:q||'porção', p, c, k});

  renderHoje();
}
function toggleSuppl(k){
  const t=today();
  ST.suppl[t]=ST.suppl[t]||{};
  ST.suppl[t][k]=!ST.suppl[t][k];
  if(!ST.suppl[t][k]) delete ST.suppl[t][k];
  if(Object.keys(ST.suppl[t]).length===0) delete ST.suppl[t];
  saveK('suppl');
  renderHoje();
}
function setCardio(f,v){
  const t=today();
  ST.cardio[t]=ST.cardio[t]||{};
  const n=num(v);
  if(n>0) ST.cardio[t][f]=n; else delete ST.cardio[t][f];
  if(Object.keys(ST.cardio[t]).length===0) delete ST.cardio[t];
  saveK('cardio');
}

  // SPARKLINE PESO
  if(bws.length>=2){
    const min=Math.min(...bws.map(b=>b.kg)), max=Math.max(...bws.map(b=>b.kg));
    const rng=Math.max(0.5, max-min);
    const w=300, hh=50;
    const pts = bws.map((b,i)=>{
      const x = (i/(bws.length-1))*w;
      const y = hh - ((b.kg-min)/rng)*hh;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const deltaClass = deltaBW>=0?'up':'dn';
    const deltaSign = deltaBW>=0?'+':'';
    h+=`<div class="spark-card">
      <div class="hdr">
        <div><div class="l">Peso corporal</div><div class="v">${lastBW.kg}<small>kg</small></div></div>
        <div class="delta ${deltaClass}">${deltaSign}${deltaBW.toFixed(1)}kg em ${bws.length} pesagens</div>
      </div>
      <svg class="spark" viewBox="0 0 ${w} ${hh}" preserveAspectRatio="none">
        <polyline points="${pts}" fill="none" stroke="url(#sg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5b9eff"/><stop offset="100%" stop-color="#7ab2ff"/></linearGradient></defs>
      </svg>
    </div>`;
  } else {
    h+=`<div class="spark-card"><div class="hdr"><div><div class="l">Peso corporal</div><div class="v" style="font-size:15px;color:var(--muted)">Pesa-te na aba <b style="color:var(--pull)">Hoje</b></div></div></div></div>`;
  }

  // VOLUME SEMANAL POR GRUPO
  h+=`<h2 class="sec">Volume semanal por grupo</h2>
  <div class="volcard">`;
  for(const mg of MG_ORDER){
    const v = wkVol[mg]||0;
    const tgt = MG_TARGETS[mg];
    const pct = Math.min(100, (v/tgt)*100);
    const c = MG_COLOR[mg];
    const isPrio = MG_PRIORITY[mg];
    const status = v>=tgt ? 'ok' : (v>=tgt*0.7 ? 'ok' : 'low');
    h+=`<div class="vbar2">
      <div class="vn ${isPrio?'prio':''}">${MG_LABELS[mg]}${isPrio?'<span class="star">★</span>':''}</div>
      <div class="track"><div class="fill" style="width:${pct}%;background:linear-gradient(90deg,${c}88,${c})"></div></div>
      <div class="vv"><b>${v.toFixed(v%1?1:0)}</b>/${tgt}</div>
    </div>`;
  }
  h+=`<p class="volnote">Séries duras feitas nos últimos 7 dias. Compostos contam 0.5 pros músculos secundários. <b>★ prioridade</b> · meta acima de 10-12 séries/semana.</p></div>`;

  // PRs por exercício
  const allPRs = [];
  for(const d of ["A","B","C","D"]){
    WK[d].ex.forEach((e,i)=>{
      const id=exId(d,i);
      const best=historicalBestE1RM(id, false);
      const h=ST.logs[id]||[];
      let bestSet=null, bestSetE1=0;
      for(const s of h){
        for(const set of (s.sets||[])){
          const e1=e1RM(set.kg,set.reps);
          if(e1>bestSetE1){ bestSetE1=e1; bestSet={...set, date:s.date}; }
        }
      }
      if(best>0 && e.t==='comp') allPRs.push({name:e.n, e1:best, set:bestSet});
    });
  }
  if(allPRs.length){
    h+=`<h2 class="sec">PRs · compostos</h2><div class="volcard">`;
    allPRs.sort((a,b)=>b.e1-a.e1).forEach(pr=>{
      h+=`<div class="anchor" style="border-color:var(--line)">
        <span style="font-size:13px">${esc(pr.name)} <small style="color:var(--faint);display:block;font-size:11px;margin-top:2px">${pr.set?`${fmtKg(pr.set.kg)}kg × ${pr.set.reps} em ${pr.set.date.slice(5)}`:''}</small></span>
        <b style="color:var(--core)">${(Math.round(pr.e1*10)/10)}kg<small style="display:block;font-size:9px;color:var(--faint);font-weight:600">e1RM</small></b>
      </div>`;
    });
    h+=`</div>`;
  }

  // MEDIDAS
  const latestM = ST.measures.length? ST.measures[ST.measures.length-1] : null;
  const firstM = ST.measures.length? ST.measures[0] : null;
  h+=`<h2 class="sec">Medidas</h2>
  <div class="check-card">
    <h3><span class="ic" style="color:var(--pull)">${I.ruler}</span>Nova medida (cm)</h3>`;
  for(const [k,nm] of MEASURE_FIELDS){
    const last = latestM?latestM[k]:'';
    h+=`<div class="ilog" style="${k!=='peito'?'border-top:1px solid var(--line);padding-top:10px':''}">
      <span class="lb">${nm}</span>
      <input id="m_${k}" inputmode="decimal" placeholder="${last||'cm'}">
      <span class="u">cm</span>
    </div>`;
  }
  h+=`<div class="tools" style="margin-top:12px"><button onclick="saveMeasures()">Salvar medidas de hoje</button></div>`;
  if(latestM){
    h+=`<div style="margin-top:14px;font-size:11.5px;color:var(--muted);font-weight:600">Última (${latestM.date.slice(5)}): `;
    h+=MEASURE_FIELDS.filter(([k])=>latestM[k]).map(([k,nm])=>{
      const d=firstM&&firstM!==latestM&&firstM[k]?` <b style="color:${(latestM[k]-firstM[k])>=0?'var(--ok)':'var(--push)'}">(${(latestM[k]-firstM[k])>=0?'+':''}${(latestM[k]-firstM[k]).toFixed(1)})</b>`:'';
      return `${nm.split(' ')[0]} <b style="color:var(--ink)">${latestM[k]}cm</b>${d}`;
    }).join(' · ');
    h+=`</div>`;
  }
  h+=`</div>`;

  // FOTOS
  h+=`<h2 class="sec">Fotos · progresso</h2>
  <div class="check-card">
    <h3><span class="ic" style="color:var(--pull)">${I.camera}</span>Tire foto cada 2 semanas (mesma luz/pose)</h3>
    <label class="uploadbtn">${I.camera} Adicionar foto de hoje
      <input type="file" accept="image/*" capture="environment" onchange="addPhoto(this)">
    </label>`;
  if(ST.photos.length){
    h+=`<div class="photos-grid">`;
    ST.photos.slice().reverse().forEach((p,idx)=>{
      const realIdx = ST.photos.length-1-idx;
      h+=`<div class="pthumb">
        <img src="${p.dataUrl}" alt="${p.date}">
        <button class="px" onclick="delPhoto(${realIdx})">×</button>
        <div class="pdate">${p.date.slice(5)}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;

  app.innerHTML=h;
}

function saveMeasures(){
  const t=today();
  const m={date:t};
  let any=false;
  for(const [k] of MEASURE_FIELDS){
    const el=document.getElementById('m_'+k);
    if(el && el.value.trim()){ m[k]=num(el.value); any=true; }
  }
  if(!any){ showToast('Preencha pelo menos uma medida', 'warn', 2000); return; }
  ST.measures = ST.measures.filter(x=>x.date!==t);
  ST.measures.push(m);
  ST.measures.sort((a,b)=>a.date<b.date?-1:1);
  if(saveK('measures')){
    showToast('Medidas salvas ✓', 'ok', 1800);
  }
  renderCorpo();
}

function addPhoto(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=800; const ratio=Math.min(1, maxW/img.width);
      const w=Math.round(img.width*ratio), h=Math.round(img.height*ratio);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL('image/jpeg', 0.78);
      ST.photos.push({date:today(), dataUrl});
      if(!saveK('photos')){
        ST.photos.pop(); // rollback
        alert('Sem espaço! Apague fotos antigas (toque no ×) e tente de novo.');
        return;
      }
      renderCorpo();
    };
    img.src=r.result;
  };
  r.readAsDataURL(f);
}
function delPhoto(idx){
  if(!confirm('Apagar essa foto?')) return;
  ST.photos.splice(idx,1); saveK('photos'); renderCorpo();
}

async function exportData(){
  const t=document.getElementById('exp'); t.classList.remove('hidden');
  const full={_v:1, _at:new Date().toISOString()};
  for(const k of Object.keys(LS)) full[k]=ST[k];
  const json=JSON.stringify(full);
  t.value=json; t.select();
  // Marca data do backup pra evitar nag até 7d
  if(!ST.meta) ST.meta={};
  ST.meta.lastBackupAt=Date.now();
  saveK('meta');
  // Tenta clipboard + share automático (iOS share sheet)
  let copied=false;
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(json);
      copied=true;
    }
  }catch(e){}
  if(copied){
    showToast('Backup copiado pra área de transferência ✓', 'ok', 2500);
  }
  // Oferece share sheet (cole no Notes, Mail, Files, etc.)
  try{
    if(navigator.share){
      const filename=`meutreino-backup-${new Date().toISOString().slice(0,10)}.json`;
      const file=new File([json], filename, {type:'application/json'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'MeuTreino Backup'});
      } else {
        await navigator.share({title:'MeuTreino Backup', text:json});
      }
    }
  }catch(e){ /* share cancel ou unsupported, segue */ }
  if(!copied) showToast('Backup gerado abaixo — copie pra um lugar seguro', 'info', 3000);
}
function importData(){
  const v=document.getElementById('imp').value.trim(); if(!v) return;
  try{
    const o=JSON.parse(v);
    // Reset ST inteiro pro default antes de aplicar (evita Frankenstein)
    if(o.logs!==undefined){
      for(const k of Object.keys(LS)){
        ST[k] = (o[k]!==undefined) ? o[k] : JSON.parse(JSON.stringify(DEFAULTS[k]));
        saveK(k);
      }
    } else {
      // backup MUITO antigo: só logs em raiz
      for(const k of Object.keys(LS)){
        ST[k] = JSON.parse(JSON.stringify(DEFAULTS[k]));
      }
      ST.logs=o; saveK('logs');
    }
    // re-roda migração de protein
    for(const date in ST.protein){
      if(!Array.isArray(ST.protein[date])) ST.protein[date]=[];

/* ============ TIMER (state machine: idle | running | paused | done) ============ */
let tTotal=90, tLeft=90, tRun=false, tInt=null, aCtx=null, wakeLock=null;
let tState='idle', tEndAt=0, autoCloseTO=null, tMinimized=false;
const CIRC=2*Math.PI*96;

function minimizeTimer(){
  // Só faz sentido se há timer rodando ou em done
  if(tState==='idle') return;
  tMinimized=true;
  const ov=document.getElementById('overlay');
  if(ov) ov.classList.add('hidden');
  const mt=document.getElementById('miniTimer');
  if(mt){
    mt.classList.remove('hidden');
    mt.setAttribute('data-state', tState==='done' ? 'done' : 'running');
  }
  updateMiniTimer();
}
function expandTimer(){
  tMinimized=false;
  const mt=document.getElementById('miniTimer');
  if(mt){ mt.classList.add('hidden'); mt.removeAttribute('data-state'); }
  const ov=document.getElementById('overlay');
  if(ov) ov.classList.remove('hidden');
  paint();
}
function updateMiniTimer(){
  if(!tMinimized) return;
  const v=document.getElementById('miniTimerVal');
  if(v){
    v.textContent = tState==='done' ? '✓ pronto' : fmt(tLeft);
  }
  const mt=document.getElementById('miniTimer');
  if(mt){
    mt.setAttribute('data-state', tState==='done' ? 'done' : 'running');
  }
}

// Unlock audio context na primeira interação (essencial pro iOS)
function unlockAudio(){
  try{
    if(!aCtx) aCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(aCtx.state==='suspended') aCtx.resume();
  }catch(e){}
}
document.addEventListener('touchstart', unlockAudio, {passive:true});
document.addEventListener('click', unlockAudio, {passive:true});

function fmt(s){ return Math.floor(s/60)+":"+String(Math.floor(s%60)).padStart(2,'0'); }
function paint(){
  const tv=document.getElementById('tval'); if(tv) tv.textContent=fmt(tLeft);
  const rf=document.getElementById('ringfill');
  if(rf){ const off=CIRC*(1-tLeft/tTotal); rf.style.strokeDashoffset=off; }
  if(tMinimized) updateMiniTimer();
}
function clearTimerStateOnly(){
  if(tInt){ clearInterval(tInt); tInt=null; }
  if(autoCloseTO){ clearTimeout(autoCloseTO); autoCloseTO=null; }
  tRun=false; tEndAt=0;
}
function setTimer(s){
  clearTimerStateOnly();
  tState='idle';
  const ov=document.getElementById('overlay'); if(ov) ov.removeAttribute('data-state');
  const ppb=document.getElementById('ppbtn');
  if(ppb){ ppb.textContent='Iniciar'; ppb.removeAttribute('data-state'); }
  tTotal=s; tLeft=s;
  const rf=document.getElementById('ringfill'); if(rf) rf.setAttribute('stroke-dasharray',CIRC);
  document.querySelectorAll('.preset').forEach(b=>b.classList.toggle('active', +b.dataset.s===s));
  paint();
}
function openTimer(s){
  if(typeof s==='number') setTimer(s); else setTimer(tTotal);
  document.getElementById('overlay').classList.remove('hidden');
  paint();
}
function closeTimer(){
  clearTimerStateOnly();
  tState='idle';
  tMinimized=false;
  releaseWakeLock();
  const ov=document.getElementById('overlay');
  if(ov){ ov.classList.add('hidden'); ov.removeAttribute('data-state'); }
  const mt=document.getElementById('miniTimer');
  if(mt){ mt.classList.add('hidden'); mt.removeAttribute('data-state'); }
  const ppb=document.getElementById('ppbtn');
  if(ppb){ ppb.textContent='Iniciar'; ppb.removeAttribute('data-state'); }
}
function toggleTimer(){
  if(tState==='done'){ closeTimer(); return; }
  if(tRun){ pauseTimer(); } else { startTimer(); }
}
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', ()=>{ wakeLock=null; });
    }
  }catch(e){}
}
function releaseWakeLock(){
  try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){}
}
// Visibility: re-adquire wake lock + reconciliar timer ao voltar do bg
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState!=='visible') return;
  // Reconcilia tempo (setInterval throttla em bg no iOS)
  if(tState==='running' && tEndAt>0){
    tLeft=Math.max(0,(tEndAt-Date.now())/1000);
    paint();
    if(tLeft<=0){ timerDone(); return; }
    if(!wakeLock) requestWakeLock();
  }
  // Auto-close se ficou "done" no bg por mais de 5s
  if(tState==='done' && !autoCloseTO){
    autoCloseTO=setTimeout(closeTimer, 1500);
  }
});

function startTimer(){
  if(tRun) return;
  if(tLeft<=0) tLeft=tTotal;
  tRun=true; tState='running';
  unlockAudio();
  maybeRequestNotificationPermission();
  const ppb=document.getElementById('ppbtn'); if(ppb) ppb.textContent='Pausar';
  requestWakeLock();
  tEndAt=Date.now()+tLeft*1000;
  tInt=setInterval(()=>{
    tLeft=Math.max(0,(tEndAt-Date.now())/1000);
    paint();
    if(tLeft<=0){ timerDone(); }
  }, 100);
}
function pauseTimer(){
  if(!tRun) return;
  tRun=false; tState='paused';
  if(tInt){ clearInterval(tInt); tInt=null; }
  tEndAt=0;
  const b=document.getElementById('ppbtn'); if(b) b.textContent='Iniciar';
}
function timerDone(){
  clearTimerStateOnly();
  tState='done';
  releaseWakeLock();
  // Se estava minimizado, expande pro user ver o estado done — feedback óbvio
  if(tMinimized){ expandTimer(); }
  const ov=document.getElementById('overlay');
  if(ov) ov.setAttribute('data-state','done');
  const ppb=document.getElementById('ppbtn');
  if(ppb){ ppb.textContent='Fechar'; ppb.setAttribute('data-state','done'); }
  playChime();
  notifyTimerDone();
  flashDone();
  autoCloseTO=setTimeout(closeTimer, 5000);
}

/* ============ Audio + Notifications ============ */
// Chime: acorde C5-E5-G5 com envelope sino. AudioContext resume agressivo.
function playChime(){
  try{
    if(!aCtx) aCtx=new (window.AudioContext||window.webkitAudioContext)();
    // resume mesmo se aparenta running (iOS às vezes mente)
    if(aCtx.state!=='running'){ aCtx.resume(); }
    const notes=[523.25,659.25,783.99];
    notes.forEach((freq,i)=>{
      const startAt=aCtx.currentTime+i*0.10;
      const o=aCtx.createOscillator(); o.type='sine'; o.frequency.value=freq;
      const o2=aCtx.createOscillator(); o2.type='sine'; o2.frequency.value=freq/2;
      const g=aCtx.createGain(); const g2=aCtx.createGain();
      o.connect(g); o2.connect(g2);
      g.connect(aCtx.destination); g2.connect(aCtx.destination);
      g.gain.setValueAtTime(0.001,startAt);
      g.gain.exponentialRampToValueAtTime(0.22,startAt+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,startAt+1.4);
      g2.gain.setValueAtTime(0.001,startAt);
      g2.gain.exponentialRampToValueAtTime(0.10,startAt+0.025);
      g2.gain.exponentialRampToValueAtTime(0.001,startAt+1.6);
      o.start(startAt); o.stop(startAt+1.5);
      o2.start(startAt); o2.stop(startAt+1.7);
    });
  }catch(e){ console.warn('chime fail', e); }
  // Vibração só Android (iOS Safari ignora silenciosamente)
  try{
    if('vibrate' in navigator && /Android/.test(navigator.userAgent)){
      navigator.vibrate([120,60,120]);
    }
  }catch(e){}
}

let notifPermAsked=false;
function maybeRequestNotificationPermission(){
  if(notifPermAsked) return;
  if(!('Notification' in window)) return;
  notifPermAsked=true;
  try{
    if(Notification.permission==='default'){
      Notification.requestPermission().then(p=>{
        if(p==='granted') showToast('Notificações ativas ✓','ok',2000);
        else if(p==='denied') showToast('Notificações bloqueadas — só som dentro do app','warn',3500);
      }).catch(()=>{});
    }
  }catch(e){}
}

function notifyTimerDone(){
  if(!('Notification' in window)) return;
  if(Notification.permission!=='granted') return;
  const opts={
    body:'Próxima série!',
    icon:'icon-192.png',
    badge:'icon-192.png',
    tag:'meutreino-timer',
    renotify:true,
  };
  // Prefere SW.showNotification (melhor sobrevivência em bg) → fallback Notification direto
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(reg=>{
        if(reg && reg.showNotification){
          reg.showNotification('⏱️ Descanso terminado', opts).catch(()=>{
            try{ new Notification('⏱️ Descanso terminado', opts); }catch(e){}
          });
          return;
        }
        try{ new Notification('⏱️ Descanso terminado', opts); }catch(e){}
      }).catch(()=>{
        try{ new Notification('⏱️ Descanso terminado', opts); }catch(e){}
      });
    } else {
      new Notification('⏱️ Descanso terminado', opts);
    }
  }catch(e){}
}

// Flash visual no overlay quando timer chega no fim
function flashDone(){
  const ov=document.getElementById('overlay');
  if(!ov || ov.classList.contains('hidden')) return;
  ov.classList.add('flash');
  setTimeout(()=>ov.classList.remove('flash'),700);
}

/* ============ SW REGISTER ============ */
if('serviceWorker' in navigator && (location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* ============ BOOT ============ */
async function boot(){
  // 1. Cleanup defensivo (phantom sessions de dias passados sem ✓)
  cleanupPhantomSessions();
  // 2. Storage seguro (resistente a ITP)
  await requestPersistentStorage();
  // 3. Aviso de quota se >80%
  await checkStorageQuota();
  // 4. Banner A2HS se não estiver em modo standalone
  maybeShowA2HSBanner();
  // 5. Backup reminder semanal (delay 1.5s pra não competir com outros toasts no boot)
  setTimeout(checkBackupReminder, 1500);
}
setTimer(90);
render();
boot();
</script>
